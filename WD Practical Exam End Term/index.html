<!DOCTYPE html>
<html>
<head>
    <title>Student Marks and Grade Calculator</title>
</head>
<body>
<h2>Student Marks and Grade Calculator</h2>
<label>Enter Number of Subjects:</label>
<input type="number" id="subjects" min="1">
<button onclick="createInputs()">Enter Marks</button>

<div id="marksInput"></div>
<div id="result"></div>

<script>
function createInputs() {
    let n = parseInt(document.getElementById("subjects").value);
    let div = document.getElementById("marksInput");
    div.innerHTML = "";
    for (let i = 1; i <= n; i++) {
        div.innerHTML += `
            <input type="number" id="mark${i}" min="0" max="100">
        `;
    }

    div.innerHTML += `<button onclick="calculate()">Calculate</button>`;
}
function calculate() {
    let n = parseInt(document.getElementById("subjects").value);
    let total = 0;
    let pass = true;

    for (let i = 1; i <= n; i++) {
        let marks = parseFloat(document.getElementById("mark" + i).value);
        if (isNaN(marks)) {
            alert("Please enter all marks.");
            return;
        }
        total += marks;
        if (marks < 35) {
            pass = false;
        }
    }

    let average = total / n;
    let grade;

    if (average >= 90)
        grade = "A+";
    else if (average >= 80)
        grade = "A";
    else if (average >= 70)
        grade = "B";
    else if (average >= 60)
        grade = "C";
    else if (average >= 50)
        grade = "D";
    else
        grade = "F";

    document.getElementById("result").innerHTML = "Total Marks: " + total + "<br>" + "Average: " + average.toFixed(2) + "<br>" + "Grade: " + grade + "<br>" + "Result: " + (pass ? "PASS" : "FAIL");
}
</script>

</body>
</html>
